# tmux configuration file

# session
set -g default-terminal "xterm-256color"
set -ag terminal-overrides ",rxvt-uni*:XT:Ms=\\E]52;%p1%s;%p2%s\\007"
set -g escape-time 0
set -g repeat-time 3000
set -g history-limit 100000
set -g display-time 4000
set -g focus-events on
setw -g aggressive-resize on
set -g base-index 1         # start numbering at 1
set -g pane-base-index 1    # start numbering at 1

# keybindings

# reload
unbind r
bind r source-file ~/.config/tmux/tmux.conf \; display-message "source-file ~/.config/tmux/tmux.conf..."

# prefix
unbind-key C-b
set-option -g prefix C-l

# navigate windows
bind-key C-p previous-window
bind-key C-n next-window

# navigate panes
bind-key h select-pane -L
bind-key j select-pane -D
bind-key k select-pane -U
bind-key l select-pane -R

# window and pane
bind % split-window -h -c "#{pane_current_path}"
bind '"' split-window -v -c "#{pane_current_path}"
bind c new-window -c "#{pane_current_path}"

# copy mode
set -g set-clipboard on
set -g allow-passthrough on
set -g mode-keys vi
set -g mouse on # mouse support
unbind [
unbind ]
bind v copy-mode
bind p paste-buffer -p
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection
bind -T copy-mode-vi MouseDragEnd1Pane send -X stop-selection
bind -T copy-mode-vi MouseDown1Pane send -X clear-selection
bind -T copy-mode-vi Escape send -X cancel

# ricing

# rename window
set-option -g automatic-rename on
set-option -g automatic-rename-format '󰞷 #{pane_current_command}  #{b:pane_current_path}'
set-option -g renumber-windows on

# style
set -g status-style "bg=default,fg=default"
set -g mode-style "fg=default,bg=#0A84FF"
set -g message-style "fg=default,bg=default"
set -g message-command-style "fg=default,bg=default"

# status bar
set -g status on
set -g status-interval 60
set -g status-position top
set -g status-justify centre
set -g window-status-format " #I #W "
set -g window-status-current-format "#[fg=#f37021,bg=default] #[fg=default,bg=#f37021]#I #W#[fg=#f37021,bg=default] "

# clock
set-option -g clock-mode-colour "white"
set-option -g clock-mode-style 24
