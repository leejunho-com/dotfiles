# VM: disable hardware cursors (required for Parallels virtio-gpu)
env = WLR_NO_HARDWARE_CURSORS,1

monitor = , preferred, auto, 1

input {
    kb_layout = us
    # kb_options = ctrl:nocaps  # TODO: add device block to exclude HHKB
    follow_mouse = 1
    touchpad {
        natural_scroll = yes
    }
}

general {
    gaps_in = 5
    gaps_out = 10
    border_size = 2
    col.active_border = rgba(f37021ff)
    col.inactive_border = rgba(595959aa)
    layout = dwindle
}

decoration {
    rounding = 8
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

$mod = ALT

# Terminal
bind = SUPER, Return, exec, ghostty

# Window
bind = SUPER, Q,       killactive
bind = $mod SHIFT, E,  exit
bind = $mod CTRL, M,   fullscreen
bind = $mod, Y,        togglefloating

# Focus (vim-style, matches skhd)
bind = $mod, H, movefocus, l
bind = $mod, L, movefocus, r
bind = $mod, K, movefocus, u
bind = $mod, J, movefocus, d

# Move window (matches skhd alt+shift)
bind = $mod SHIFT, H, movewindow, l
bind = $mod SHIFT, L, movewindow, r
bind = $mod SHIFT, K, movewindow, u
bind = $mod SHIFT, J, movewindow, d

# Resize (matches skhd alt+ctrl)
binde = $mod CTRL, H, resizeactive, -50 0
binde = $mod CTRL, L, resizeactive,  50 0
binde = $mod CTRL, K, resizeactive, 0 -50
binde = $mod CTRL, J, resizeactive, 0  50

# Workspaces (ctrl = switch, ctrl+shift = move window)
bind = CTRL, 1, workspace, 1
bind = CTRL, 2, workspace, 2
bind = CTRL, 3, workspace, 3
bind = CTRL, 4, workspace, 4
bind = CTRL, 5, workspace, 5
bind = CTRL, 6, workspace, 6
bind = CTRL, 7, workspace, 7
bind = CTRL, 8, workspace, 8
bind = CTRL, 9, workspace, 9

bind = CTRL SHIFT, 1, movetoworkspace, 1
bind = CTRL SHIFT, 2, movetoworkspace, 2
bind = CTRL SHIFT, 3, movetoworkspace, 3
bind = CTRL SHIFT, 4, movetoworkspace, 4
bind = CTRL SHIFT, 5, movetoworkspace, 5
bind = CTRL SHIFT, 6, movetoworkspace, 6
bind = CTRL SHIFT, 7, movetoworkspace, 7
bind = CTRL SHIFT, 8, movetoworkspace, 8
bind = CTRL SHIFT, 9, movetoworkspace, 9

# Mouse
bindm = CTRL, mouse:272, movewindow
bindm = CTRL, mouse:273, resizewindow
