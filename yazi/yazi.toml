[mgr]
show_hidden = false
sort_by = "natural"
linemode = "size"

[preview]
max_width = 2000
max_height = 3000

[opener]
edit = [
  { run = 'nvim "$@"', block = true },
  { run = 'bat "$@"', block = true },
  { run = 'code "$@"', block = true },
]
photoshop = [
  { for = "macos", run = 'open -a "Adobe Photoshop 2026" "$@"', desc = "Adobe Photoshop" },
]
unar = [
  { run = 'for rar in "$@"; do unar "$rar"; done', desc = "Extract with unar" },
]
mpv = [
  { run = 'mpv "$@"', desc = "mpv" },
]

[open]
prepend_rules = [
  # archive
  { url = "*.{zip,7z}", use = [ "extract", "mpv", "reveal" ] },
  { url = "*.rar",      use = [ "unar", "mpv", "reveal" ] },
  # image
  { url = "*.{jpg,jpeg,png,bmp,tif,tiff,gif,psd,webp,arw,dng}", use = [ "mpv", "photoshop", "open", "reveal" ] },
  # video
  { url = "*.{3gp,avi,mkv,mp4,webm,mov,ts,m2ts,mp3,flac,opus,m4a,wav,ogg,jpg,jpeg,png,webp,avif}", use = [ "mpv", "reveal" ] },
  # other
  { url = "*.smi", use = [ "edit" ] }
]

[tasks]
image_bound = [0, 0]
