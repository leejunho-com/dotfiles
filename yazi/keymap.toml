[mgr]

prepend_keymap = [
	{ on = [ "q" ], run = 'close', desc = "Close the current tab, or quit if it is last tab" },
	{ on = [ "<C-q>" ], run = 'quit', desc = "Exit the process" },
  { on = "!", for = "macos", run = '''shell 'open -na Ghostty --args --working-directory="$PWD"' --block false''', desc = "Open Ghostty here" },
  { on = "!", for = "linux", run = 'shell "ghostty --working-directory=$PWD &" --block false', desc = "Open Ghostty here" },
# goto
  { on = [ "g", "v" ], for = "macos", run = "cd /Volumes",     desc = "Go /Volumes"    },
  { on = [ "g", "v" ], for = "linux", run = "cd /mnt",         desc = "Go /mnt"        },
  { on = [ "g", "m" ], for = "macos", run = "cd ~/mnt",        desc = "Go ~/mnt"       },
  { on = [ "g", "m" ], for = "linux", run = "cd /mnt",         desc = "Go /mnt"        },
  { on = [ "g", "l" ], for = "unix",  run = "cd ~/Downloads",  desc = "Go ~/Downloads" },
  { on = [ "g", "d" ], for = "unix",  run = "cd ~/Desktop",    desc = "Go ~/Desktop"   },
  { on = [ "g", "o" ], for = "unix",  run = "cd ~/Documents",  desc = "Go ~/Documents" },
  { on = [ "g", "w" ], for = "macos", run = '''shell --confirm 'open -a "Parallels Desktop" "$(dirname "$1")" && osascript -e "tell application \"Parallels Desktop\" to activate"' ''', desc = "Reveal in Windows" },

# plugin
  # zoom
  {on   = "+", run  = "plugin zoom 1", desc = "Zoom in hovered file"},
  {on   = "-", run  = "plugin zoom -1", desc = "Zoom out hovered file"},
]
